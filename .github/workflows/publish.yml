name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - core
          - node
          - browser
          - all
      version:
        description: 'Version bump type (patch/minor/major) or specific version (e.g., 1.2.3). Leave empty to use current version.'
        required: false
        type: string
        default: ''
  release:
    types: [published]
  push:
    tags:
      - '**'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.determine.outputs.packages }}
      publish_core: ${{ steps.determine.outputs.publish_core }}
      publish_node: ${{ steps.determine.outputs.publish_node }}
      publish_browser: ${{ steps.determine.outputs.publish_browser }}
    steps:
      - id: determine
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PACKAGE="${{ inputs.package }}"
          else
            # For releases/tags, publish all packages
            PACKAGE="all"
          fi
          
          echo "Selected package scope: $PACKAGE"
          
          if [ "$PACKAGE" == "all" ]; then
            {
              echo "packages=core,node,browser"
              echo "publish_core=true"
              echo "publish_node=true"
              echo "publish_browser=true"
            } >> "$GITHUB_OUTPUT"
          elif [ "$PACKAGE" == "core" ]; then
            {
              echo "packages=core"
              echo "publish_core=true"
              echo "publish_node=false"
              echo "publish_browser=false"
            } >> "$GITHUB_OUTPUT"
          elif [ "$PACKAGE" == "node" ]; then
            {
              echo "packages=core,node"
              echo "publish_core=true"
              echo "publish_node=true"
              echo "publish_browser=false"
            } >> "$GITHUB_OUTPUT"
          elif [ "$PACKAGE" == "browser" ]; then
            {
              echo "packages=core,browser"
              echo "publish_core=true"
              echo "publish_node=false"
              echo "publish_browser=true"
            } >> "$GITHUB_OUTPUT"
          fi

  prebuild_node:
    needs: setup
    if: needs.setup.outputs.publish_node == 'true'
    name: Prebuild Node on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prebuilds
        run: pnpm --filter @swisseph/node run prebuild

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}
          path: packages/node/prebuilds
          retention-days: 1

  publish:
    needs: [setup, prebuild_node]
    # Run if setup succeeded, and prebuild_node either succeeded or was skipped (because not publishing node)
    if: |
      always() && 
      needs.setup.result == 'success' && 
      (needs.prebuild_node.result == 'success' || needs.prebuild_node.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm for Trusted Publishing
        run: |
          echo "Using npm Trusted Publisher authentication via OIDC"
          echo "Checking npm version..."
          npm --version
          echo "Verifying OIDC token availability..."
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "✓ OIDC token request URL is available"
          else
            echo "✗ OIDC token request URL not found!"
            exit 1
          fi

      - name: Setup Emscripten
        if: needs.setup.outputs.publish_browser == 'true'
        uses: mymindstorm/setup-emsdk@v12
        with:
          version: 'latest'

      # Download and merge prebuilds if we are publishing node
      - name: Download Node.js prebuilds
        if: needs.setup.outputs.publish_node == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: prebuilds-*
          path: packages/node/prebuilds
          merge-multiple: true

      - name: Bump versions
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          
          if [ "${{ needs.setup.outputs.publish_core }}" == "true" ]; then
            cd packages/core
            pnpm version "$VERSION" --no-git-tag-version
            cd ../..
          fi
          
          if [ "${{ needs.setup.outputs.publish_node }}" == "true" ]; then
            cd packages/node
            pnpm version "$VERSION" --no-git-tag-version
            cd ../..
          fi
          
          if [ "${{ needs.setup.outputs.publish_browser }}" == "true" ]; then
            cd packages/browser
            pnpm version "$VERSION" --no-git-tag-version
            cd ../..
          fi

      - name: Build and publish @swisseph/core
        if: needs.setup.outputs.publish_core == 'true'
        working-directory: packages/core
        run: |
          echo "Building @swisseph/core..."
          pnpm build

          echo "Packing @swisseph/core with pnpm..."
          pnpm pack --out "$RUNNER_TEMP/swisseph-core.tgz"

          echo "Publishing @swisseph/core with provenance..."
          npm publish "$RUNNER_TEMP/swisseph-core.tgz" --access public --provenance

      - name: Build and publish @swisseph/node
        if: needs.setup.outputs.publish_node == 'true'
        working-directory: packages/node
        run: |
          echo "Building @swisseph/node (JS only)..."
          # Use build:js to avoid rebuilding native addon locally, since we have prebuilds
          pnpm run build:js

          echo "Packing @swisseph/node with pnpm..."
          pnpm pack --out "$RUNNER_TEMP/swisseph-node.tgz"
          if tar -xOf "$RUNNER_TEMP/swisseph-node.tgz" package/package.json | grep -q 'workspace:'; then
            echo "Packed @swisseph/node still contains a workspace dependency"
            exit 1
          fi

          echo "Publishing @swisseph/node with provenance..."
          npm publish "$RUNNER_TEMP/swisseph-node.tgz" --access public --provenance

      - name: Build and publish @swisseph/browser
        if: needs.setup.outputs.publish_browser == 'true'
        working-directory: packages/browser
        run: |
          echo "Building @swisseph/browser..."
          pnpm run build:all

          echo "Packing @swisseph/browser with pnpm..."
          pnpm pack --out "$RUNNER_TEMP/swisseph-browser.tgz"
          if tar -xOf "$RUNNER_TEMP/swisseph-browser.tgz" package/package.json | grep -q 'workspace:'; then
            echo "Packed @swisseph/browser still contains a workspace dependency"
            exit 1
          fi

          echo "Publishing @swisseph/browser with provenance..."
          npm publish "$RUNNER_TEMP/swisseph-browser.tgz" --access public --provenance

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Publishing Summary"
            echo ""
            echo "Published packages:"
            if [ "${{ needs.setup.outputs.publish_core }}" == "true" ]; then
              echo "- ✅ @swisseph/core"
            fi
            if [ "${{ needs.setup.outputs.publish_node }}" == "true" ]; then
              echo "- ✅ @swisseph/node"
            fi
            if [ "${{ needs.setup.outputs.publish_browser }}" == "true" ]; then
              echo "- ✅ @swisseph/browser"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
